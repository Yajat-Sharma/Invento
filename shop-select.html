<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Invento — Select or create your shop">
<title>Invento — My Shops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="auth.js"></script>
<style>
:root { --page-bg: #0d1117; }
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); padding: 1.5rem; }
.shop-select-header { text-align: center; margin-bottom: 2.5rem; }
.shop-select-header .logo { font-size: 2.5rem; margin-bottom: .5rem; }
.shop-select-header h1 { font-size: 1.75rem; font-weight: 800; color: var(--text-1); letter-spacing: -.03em; }
.shop-select-header p { font-size: .9rem; color: var(--text-2); margin-top: .4rem; }
.shops-wrapper { width: 100%; max-width: 800px; }
.user-strip { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: .85rem 1.25rem; margin-bottom: 1.5rem; }
.user-strip-info { display: flex; align-items: center; gap: .75rem; }
.user-strip-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; color: #fff; flex-shrink: 0; }
.user-strip-name { font-size: .9rem; font-weight: 600; color: var(--text-1); }
.user-strip-email { font-size: .78rem; color: var(--text-2); }
.shops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
.shop-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r-lg); padding: 1.5rem; cursor: pointer; transition: all .2s; position: relative; text-align: center; }
.shop-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.shop-card.active-shop { border-color: var(--success); background: linear-gradient(135deg, rgba(34,197,94,.06), var(--surface)); }
.shop-card .shop-icon { font-size: 2.5rem; margin-bottom: .75rem; }
.shop-card .shop-name { font-size: 1rem; font-weight: 700; color: var(--text-1); margin-bottom: .25rem; }
.shop-card .shop-meta { font-size: .78rem; color: var(--text-2); }
.shop-card .shop-role-badge { position: absolute; top: .75rem; right: .75rem; font-size: .7rem; font-weight: 600; padding: .2rem .5rem; border-radius: 20px; background: rgba(79,142,247,.15); color: var(--accent); }
.shop-card .active-dot { position: absolute; top: .75rem; left: .75rem; width: 8px; height: 8px; background: var(--success); border-radius: 50%; }
.shop-card-create { background: transparent; border: 1.5px dashed var(--border-hi); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 160px; }
.shop-card-create:hover { border-color: var(--accent); background: var(--accent-dim); }
.shop-card-create .add-icon { font-size: 2rem; color: var(--text-3); margin-bottom: .5rem; transition: color .2s; }
.shop-card-create:hover .add-icon { color: var(--accent); }
.shop-card-create .add-label { font-size: .85rem; font-weight: 600; color: var(--text-2); }
/* Create Shop Panel */
.create-shop-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 1.5rem; margin-top: 1rem; display: none; }
.create-shop-panel.open { display: block; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="toast-container"></div>

<div class="shop-select-header">
  <div class="logo">📦</div>
  <h1>Invento</h1>
  <p>Select a shop to continue, or create a new one</p>
</div>

<div class="shops-wrapper">
  <div class="user-strip" id="userStrip">
    <div class="user-strip-info">
      <div class="user-strip-avatar" id="userAvatar">?</div>
      <div>
        <div class="user-strip-name" id="userName">Loading…</div>
        <div class="user-strip-email" id="userEmail"></div>
      </div>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="logoutUser()">Sign Out</button>
  </div>

  <div class="shops-grid" id="shopsGrid"></div>

  <!-- Create New Shop Panel -->
  <div class="create-shop-panel" id="createPanel">
    <h3 style="font-size:1rem;font-weight:700;margin-bottom:1rem;">🏪 Create New Shop</h3>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Shop Name <span class="req">*</span></label>
        <input type="text" class="form-control" id="newShopName" placeholder="e.g. Sharma General Store">
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="newShopPhone" placeholder="+91 98765 43210">
      </div>
      <div class="form-group">
        <label class="form-label">City / Address</label>
        <input type="text" class="form-control" id="newShopAddress" placeholder="e.g. Mumbai">
      </div>
      <div class="form-group">
        <label class="form-label">GST Number</label>
        <input type="text" class="form-control" id="newShopGST" placeholder="Optional">
      </div>
      <div class="form-group">
        <label class="form-label">Currency Symbol</label>
        <input type="text" class="form-control" id="newShopCurrency" placeholder="₹" maxlength="3" value="₹">
      </div>
    </div>
    <div style="display:flex;gap:.5rem;margin-top:.5rem;">
      <button class="btn btn-secondary" onclick="closeCreatePanel()">Cancel</button>
      <button class="btn btn-primary" onclick="createShop()">Create Shop</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
// Must be logged in to reach this page
const user = getCurrentUser();
if (!user) { location.href = 'login.html'; }

// Run migration (idempotent)
migrateToMultiShop();

const userInitials = (user.name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
document.getElementById('userAvatar').textContent = userInitials;
document.getElementById('userName').textContent   = user.name || user.email;
document.getElementById('userEmail').textContent  = user.email;

function renderShops() {
  const shops        = DB.getShops();
  const currentShop  = getCurrentShopId();
  const grid         = document.getElementById('shopsGrid');

  let html = shops.map(sh => {
    const role    = (sh.members || []).find(m => m.userId === user.id)?.role || 'staff';
    const isActive = sh.id === currentShop;
    const products  = (() => { try { return JSON.parse(localStorage.getItem(`stocksense_${user.id}_${sh.id}_products`)) || []; } catch { return []; } })();
    return `
      <div class="shop-card${isActive ? ' active-shop' : ''}" onclick="selectShop('${sh.id}')">
        ${isActive ? '<div class="active-dot" title="Last active"></div>' : ''}
        <div class="shop-role-badge">${role}</div>
        <div class="shop-icon">🏪</div>
        <div class="shop-name">${escapeHtml(sh.name)}</div>
        <div class="shop-meta">${products.length} products${sh.address ? ' · ' + escapeHtml(sh.address) : ''}</div>
      </div>`;
  }).join('');

  html += `<div class="shop-card shop-card-create" onclick="openCreatePanel()">
    <div class="add-icon">➕</div>
    <div class="add-label">Create New Shop</div>
  </div>`;

  grid.innerHTML = html;
}
renderShops();

function selectShop(shopId) {
  setCurrentShopId(shopId);
  showToast('Shop selected!', 'success');
  setTimeout(() => { location.href = 'dashboard.html'; }, 500);
}

function openCreatePanel() {
  document.getElementById('createPanel').classList.add('open');
  document.getElementById('newShopName').focus();
}
function closeCreatePanel() {
  document.getElementById('createPanel').classList.remove('open');
}
function createShop() {
  const name = document.getElementById('newShopName').value.trim();
  if (!name) { showToast('Shop name is required', 'error'); return; }
  const shopId = genId('shop');
  const shop = {
    id:        shopId,
    name,
    phone:     document.getElementById('newShopPhone').value.trim(),
    address:   document.getElementById('newShopAddress').value.trim(),
    gst:       document.getElementById('newShopGST').value.trim(),
    currency:  document.getElementById('newShopCurrency').value.trim() || '₹',
    ownerId:   user.id,
    createdAt: new Date().toISOString(),
    members:   [{ userId: user.id, name: user.name || 'Owner', email: user.email || '', role: 'owner', addedAt: new Date().toISOString() }]
  };
  DB.addShop(shop);
  setCurrentShopId(shopId);
  showToast('Shop created!');
  setTimeout(() => { location.href = 'dashboard.html'; }, 700);
}
</script>
</body>
</html>

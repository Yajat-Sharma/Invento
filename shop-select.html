<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Invento — Select or create your shop">
<title>Invento — My Shops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="auth.js"></script>
<style>
:root { --page-bg: #020617; }
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); padding: 1.5rem; }
.shop-select-header { text-align: center; margin-bottom: 2.5rem; }
.shop-select-header .logo { width: 56px; height: 56px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.75rem; margin: 0 auto 1rem; box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3); }
.shop-select-header h1 { font-size: 1.75rem; font-weight: 800; color: var(--text-1); letter-spacing: -.03em; }
.shop-select-header p { font-size: .9rem; color: var(--text-2); margin-top: .4rem; }
.shops-wrapper { width: 100%; max-width: 800px; }
.user-strip { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: .85rem 1.25rem; margin-bottom: 1.5rem; box-shadow: var(--shadow-sm); }
.user-strip-info { display: flex; align-items: center; gap: .75rem; }
.user-strip-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; color: #fff; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
.user-strip-name { font-size: .9rem; font-weight: 600; color: var(--text-1); }
.user-strip-email { font-size: .78rem; color: var(--text-2); }
.shops-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
.shop-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 1.5rem; cursor: pointer; transition: all .2s; position: relative; text-align: center; box-shadow: var(--shadow-sm); }
.shop-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.shop-card.active-shop { border-color: var(--led-blue); background: rgba(59, 130, 246, 0.05); }
.shop-card .shop-icon { font-size: 2.5rem; margin-bottom: .75rem; }
.shop-card .shop-name { font-size: 1rem; font-weight: 700; color: var(--text-1); margin-bottom: .25rem; }
.shop-card .shop-meta { font-size: .78rem; color: var(--text-2); }
.shop-card .shop-role-badge { position: absolute; top: .75rem; right: .75rem; font-size: .7rem; font-weight: 700; padding: .18rem .45rem; border-radius: 20px; background: rgba(59,130,246,0.1); color: var(--led-blue); border: 1px solid rgba(59,130,246,0.2); text-transform: uppercase; }
.shop-card .active-dot { position: absolute; top: .75rem; left: .75rem; width: 8px; height: 8px; background: var(--led-green); border-radius: 50%; box-shadow: 0 0 8px var(--led-green); }
.shop-card-create { background: transparent; border: 2px dashed var(--border-hi); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 160px; box-shadow: none; }
.shop-card-create:hover { border-color: var(--accent); background: rgba(59, 130, 246, 0.05); }
.shop-card-create .add-icon { font-size: 2rem; color: var(--text-3); margin-bottom: .5rem; transition: color .2s; }
.shop-card-create:hover .add-icon { color: var(--accent); }
.shop-card-create .add-label { font-size: .85rem; font-weight: 600; color: var(--text-2); }
/* Create Shop Panel */
.create-shop-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 1.5rem; margin-top: 1rem; display: none; box-shadow: var(--shadow-lg); }
.create-shop-panel.open { display: block; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="toast-container"></div>

<div class="shop-select-header">
  <div class="logo">📦</div>
  <h1>Invento</h1>
  <p>Manage multiple shops with ease</p>
</div>

<div class="shops-wrapper">
  <div class="user-strip">
    <div class="user-strip-info">
      <div class="user-strip-avatar" id="userAvatar">?</div>
      <div>
        <div class="user-strip-name" id="userName">User Name</div>
        <div class="user-strip-email" id="userEmail">user@example.com</div>
      </div>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="logoutUser()">Logout</button>
  </div>

  <div class="shops-grid" id="shopsGrid"></div>

  <div class="create-shop-panel" id="createShopPanel">
    <div class="section-header"><h3>Create New Shop</h3></div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Shop Name <span class="req">*</span></label>
        <input type="text" class="form-control" id="newShopName" placeholder="e.g. Downtown Branch">
      </div>
      <div class="form-group">
        <label class="form-label">Currency Symbol</label>
        <input type="text" class="form-control" id="newShopCurrency" value="₹" placeholder="e.g. $">
      </div>
      <div class="form-group" style="grid-column:1/-1;">
        <label class="form-label">Address</label>
        <input type="text" class="form-control" id="newShopAddress" placeholder="Full shop address">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="toggleCreatePanel(false)">Cancel</button>
      <button class="btn btn-primary" onclick="handleCreateShop()">Create Shop</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const user = getCurrentUser();
if (!user) { location.href = 'login.html'; }

// Init data
migrateToMultiShop(); 

function renderShops() {
  const shops    = DB.getShops();
  const activeId = getCurrentShopId();
  const grid     = document.getElementById('shopsGrid');
  
  document.getElementById('userName').textContent  = user.name;
  document.getElementById('userEmail').textContent = user.email;
  document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();

  let html = shops.map(s => {
    const isActive = s.id === activeId;
    const role = (s.members || []).find(m => m.userId === user.id)?.role || 'member';
    return `
      <div class="shop-card ${isActive ? 'active-shop' : ''}" onclick="selectShop('${s.id}')">
        ${isActive ? '<div class="active-dot"></div>' : ''}
        <div class="shop-role-badge">${role}</div>
        <div class="shop-icon">🏬</div>
        <div class="shop-name">${escapeHtml(s.name)}</div>
        <div class="shop-meta">${escapeHtml(s.address || 'No address set')}</div>
      </div>`;
  }).join('');

  html += `
    <div class="shop-card shop-card-create" onclick="toggleCreatePanel(true)">
      <div class="add-icon">+</div>
      <div class="add-label">Add Another Shop</div>
    </div>`;
    
  grid.innerHTML = html;
}

function selectShop(id) {
  setCurrentShopId(id);
  showToast('Switching shop...', 'info');
  setTimeout(() => location.href = 'dashboard.html', 500);
}

function toggleCreatePanel(show) {
  const panel = document.getElementById('createShopPanel');
  panel.classList.toggle('open', show);
  if (show) panel.scrollIntoView({ behavior:'smooth' });
}

function handleCreateShop() {
  const name = document.getElementById('newShopName').value.trim();
  const curr = document.getElementById('newShopCurrency').value.trim() || '₹';
  const addr = document.getElementById('newShopAddress').value.trim();
  
  if (!name) { showToast('Shop name is required', 'error'); return; }
  
  const shopId = genId('shop');
  const newShop = {
    id: shopId, name, address: addr, currency: curr, ownerId: user.id, createdAt: now(),
    members: [{ userId: user.id, name: user.name, email: user.email, role: 'owner', addedAt: now() }]
  };
  
  DB.addShop(newShop);
  setCurrentShopId(shopId);
  showToast('Shop created successfully!', 'success');
  renderShops();
  toggleCreatePanel(false);
  
  setTimeout(() => location.href = 'dashboard.html', 1000);
}

renderShops();
applyDarkMode();
</script>
</body>
</html>

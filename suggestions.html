<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Smart Suggestions for Invento — Reduce waste intelligently">
    <title>Invento — AI Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css"> <!-- Reusing sidebar layout -->
    <link rel="stylesheet" href="suggestions.css">
    <script src="auth.js"></script>
    <script>requireAuth();</script>
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <div style="width:32px;height:32px;background:linear-gradient(135deg, #3b82f6, #8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;">📦</div>
                <span class="brand-name">Invento Admin</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="icon">📱</span> User Dashboard</a>
                <a href="calendar.html" class="nav-item"><span class="icon">📅</span> Expiry Calendar</a>
                <div class="divider"></div>
                <a href="admin.html" class="nav-item"><span class="icon">📊</span> Admin Overview</a>
                <a href="suggestions.html" class="nav-item active" title="Smart AI Suggestions"><span
                        class="icon">🧠</span> AI Insights</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <!-- Particles -->
            <div id="particles-bg"></div>

            <div class="floating-icons-container" id="floatingIconsContainer">
                <div class="float-icon fi-brain">🧠</div>
                <div class="float-icon fi-meds">💊</div>
                <div class="float-icon fi-milk">🥛</div>
                <div class="float-icon fi-veg">🥦</div>
                <div class="float-icon fi-bell">🔔</div>
            </div>

            <div class="suggestions-container">
                <header class="suggestions-header">
                    <div class="ai-badge">Powered by Invento AI</div>
                    <h1>Smart Stock Suggestions</h1>
                    <p>Our intelligent engine analyzes your inventory and sales data to provide actionable insights.
                    </p>
                </header>

                <!-- Loading State (hidden after logic runs) -->
                <div id="aiLoading" class="ai-loading">
                    <div class="brain-loader">🧠</div>
                    <p>Analyzing inventory patterns...</p>
                </div>

                <div id="suggestionsList" class="suggestions-grid">
                    <!-- Suggestions will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <script src="suggestions.js"></script>
</body>

</html>

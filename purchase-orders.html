<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Invento — Purchase Orders">
<title>Invento — Purchase Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="auth.js"></script><script>requireAuth();</script>
</head>
<body>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle"><svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button class="sidebar-collapse-btn" id="sidebarCollapseBtn"><svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M11 19l-7-7 7-7M18 5v14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <h1 class="page-title">Purchase Orders</h1>
      </div>
      <div class="topbar-right">
        <a href="alerts.html" class="icon-btn"><svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="notif-dot" id="notifDot" style="display:none"></span></a>
        <div class="user-avatar" id="topbarAvatar" style="width:36px;height:36px;border-radius:50%;font-size:.7rem;cursor:default;flex-shrink:0;">?</div>
      </div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <div class="page-header-left"><h2>Supplier Orders</h2><p>Create and track restock orders from suppliers</p></div>
        <button class="btn btn-primary" id="addOrderBtn">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>New Order
        </button>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table class="data-table">
            <thead><tr><th>Order ID</th><th>Supplier</th><th>Date</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
        <div class="empty-state" id="ordersEmpty" style="display:none;">
          <div class="empty-state-icon"><svg width="40" height="40" fill="none" viewBox="0 0 24 24" style="opacity:.3"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <h3>No purchase orders yet.</h3>
          <p>Create orders to manage your inventory restocks professionally.</p>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal" style="max-width:800px;">
    <div class="modal-header">
      <span class="modal-title" id="orderModalTitle">New Purchase Order</span>
      <button class="modal-close" id="orderModalClose"><svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editOrderId">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Supplier <span class="req">*</span></label>
          <select class="form-control" id="orderSupplier"><option value="">Select supplier…</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">Order Date <span class="req">*</span></label>
          <input type="date" class="form-control" id="orderDate">
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-control" id="orderStatus">
            <option value="Draft">Draft</option>
            <option value="Pending">Pending</option>
            <option value="Received" disabled>Received (via Action)</option>
          </select>
        </div>
      </div>

      <div style="margin-top:1.5rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
          <h3 style="font-size:0.9rem;margin:0;">Order Items</h3>
          <button type="button" class="btn btn-secondary btn-sm" id="addItemBtn">+ Add Item</button>
        </div>
        <div class="table-wrapper" style="border:1px solid var(--border);border-radius:8px;">
          <table class="data-table" style="margin:0;">
            <thead><tr><th>Product</th><th style="width:100px;">Qty</th><th style="width:150px;">Unit Cost</th><th>Total</th><th style="width:50px;"></th></tr></thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>
        <div id="totalSection" style="text-align:right;margin-top:1rem;font-size:1.1rem;font-weight:700;">
          Total: <span id="orderTotal">₹0.00</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="orderModalCancel">Cancel</button>
      <button class="btn btn-primary" id="orderModalSave">Save Order</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="shared.js"></script>
<script>
initPage('purchase-orders');

function populateSuppliers() {
  const sups = DB.getSuppliers();
  const sel = document.getElementById('orderSupplier');
  sel.innerHTML = '<option value="">Select supplier…</option>' + sups.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
}
populateSuppliers();

function renderOrders() {
  const orders = DB.getPurchaseOrders();
  const tbody  = document.getElementById('ordersBody');
  const empty  = document.getElementById('ordersEmpty');
  if (!orders.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  
  const statusColors = { Draft: 'badge-expired', Pending: 'badge-info', Received: 'badge-good' };

  tbody.innerHTML = orders.map(o => {
    const sup = DB.getSupplierById(o.supplierId);
    const isReceived = o.status === 'Received';
    return `<tr>
      <td class="td-dim" style="font-family:monospace;">${o.id}</td>
      <td class="td-name">${escapeHtml(sup?.name || 'Unknown')}</td>
      <td class="td-dim">${formatDate(o.date)}</td>
      <td style="font-weight:600;">${formatCurrency(o.totalAmount)}</td>
      <td><span class="badge ${statusColors[o.status] || 'badge-expired'}">${o.status}</span></td>
      <td>
        <div style="display:flex;gap:.3rem;">
          ${!isReceived ? `<button class="btn btn-success btn-sm receive-order" data-id="${o.id}">✅ Receive</button>` : ''}
          <button class="btn btn-secondary btn-icon btn-sm edit-order" data-id="${o.id}" title="Edit">✏️</button>
          <button class="btn btn-danger btn-icon btn-sm del-order" data-id="${o.id}" title="Delete">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.querySelectorAll('.edit-order').forEach(btn => btn.addEventListener('click', () => openModal(DB.getPurchaseOrderById(btn.dataset.id))));
  document.querySelectorAll('.receive-order').forEach(btn => btn.addEventListener('click', () => {
    showConfirm('Receive Order', 'Mark this order as Received? Product quantities will be updated in inventory.', () => {
      const order = DB.getPurchaseOrderById(btn.dataset.id);
      if (order.status === 'Received') return;
      
      // Update inventory
      order.items.forEach(item => {
        const prod = DB.getProductById(item.productId);
        if (prod) {
          const newQty = Number(prod.quantity || 0) + Number(item.quantity || 0);
          DB.updateProduct(prod.id, { quantity: newQty, costPrice: item.cost }); // Update cost price to latest
        }
      });
      
      DB.updatePurchaseOrder(order.id, { status: 'Received', receivedAt: now() });
      renderOrders();
      showToast('Order received and stock updated!');
    });
  }));
  document.querySelectorAll('.del-order').forEach(btn => btn.addEventListener('click', () => {
    showConfirm('Delete Order', 'Delete this purchase order record?', () => { DB.deletePurchaseOrder(btn.dataset.id); renderOrders(); showToast('Order deleted', 'error'); });
  }));
}
renderOrders();

let editId = null;
let orderItems = [];

function openModal(order = null) {
  editId = order?.id || null;
  document.getElementById('orderModalTitle').textContent = order ? 'Edit Purchase Order' : 'New Purchase Order';
  document.getElementById('orderSupplier').value = order?.supplierId || '';
  document.getElementById('orderDate').value     = order?.date || todayStr();
  document.getElementById('orderStatus').value   = order?.status || 'Draft';
  orderItems = order ? JSON.parse(JSON.stringify(order.items)) : [];
  renderItems();
  document.getElementById('orderModal').classList.add('active');
}
function closeModal() { document.getElementById('orderModal').classList.remove('active'); editId = null; }

function renderItems() {
  const tbody = document.getElementById('itemsBody');
  const products = DB.getProducts();
  
  tbody.innerHTML = orderItems.map((item, idx) => `
    <tr>
      <td>
        <select class="form-control item-prod" data-idx="${idx}">
          <option value="">Select product…</option>
          ${products.map(p => `<option value="${p.id}" ${p.id === item.productId ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('')}
        </select>
      </td>
      <td><input type="number" class="form-control item-qty" data-idx="${idx}" value="${item.quantity}" min="1"></td>
      <td><input type="number" class="form-control item-cost" data-idx="${idx}" value="${item.cost}" min="0" step="0.01"></td>
      <td style="font-weight:600;">₹${(item.quantity * item.cost).toFixed(2)}</td>
      <td><button class="btn btn-danger btn-icon btn-sm remove-item" data-idx="${idx}">✕</button></td>
    </tr>
  `).join('');
  
  const total = orderItems.reduce((sum, item) => sum + (item.quantity * item.cost), 0);
  document.getElementById('orderTotal').textContent = formatCurrency(total);
  
  // Events
  document.querySelectorAll('.item-prod').forEach(el => el.addEventListener('change', e => {
    const idx = e.target.dataset.idx;
    orderItems[idx].productId = e.target.value;
    const prod = products.find(p => p.id === e.target.value);
    if (prod && !orderItems[idx].cost) {
      orderItems[idx].cost = Number(prod.costPrice || 0);
      renderItems();
    }
  }));
  document.querySelectorAll('.item-qty').forEach(el => el.addEventListener('input', e => { orderItems[e.target.dataset.idx].quantity = Number(e.target.value); renderItems(); }));
  document.querySelectorAll('.item-cost').forEach(el => el.addEventListener('input', e => { orderItems[e.target.dataset.idx].cost = Number(e.target.value); renderItems(); }));
  document.querySelectorAll('.remove-item').forEach(el => el.addEventListener('click', e => { orderItems.splice(e.target.dataset.idx, 1); renderItems(); }));
}

document.getElementById('addOrderBtn').addEventListener('click', () => openModal());
document.getElementById('addItemBtn').addEventListener('click', () => {
  orderItems.push({ productId: '', quantity: 1, cost: 0 });
  renderItems();
});
document.getElementById('orderModalClose').addEventListener('click', closeModal);
document.getElementById('orderModalCancel').addEventListener('click', closeModal);
document.getElementById('orderModalSave').addEventListener('click', () => {
  const supplierId = document.getElementById('orderSupplier').value;
  const date       = document.getElementById('orderDate').value;
  const status     = document.getElementById('orderStatus').value;
  
  if (!supplierId || !date || orderItems.length === 0) { showToast('Please fill all required fields and add items', 'warning'); return; }
  
  const total = orderItems.reduce((sum, item) => sum + (item.quantity * item.cost), 0);
  const data = { supplierId, date, status, items: orderItems, totalAmount: total };
  
  if (editId) { DB.updatePurchaseOrder(editId, data); showToast('Order updated!'); }
  else { DB.addPurchaseOrder({ id: genId('po'), ...data, createdAt: now() }); showToast('Order created!'); }
  closeModal(); renderOrders();
});
</script>
</body>
</html>

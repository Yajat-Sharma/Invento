<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Invento — Expiry Calendar">
<title>Invento — Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="auth.js"></script><script>requireAuth();</script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<style>
  /* FullCalendar Overrides for Modern Dark Theme */
  .fc { font-family: inherit !important; --fc-border-color: var(--border); --fc-today-bg-color: rgba(59, 130, 246, 0.05); }
  .fc-theme-standard td, .fc-theme-standard th { border-color: var(--border) !important; }
  .fc-col-header-cell { background: #0f172a; padding: 10px 0 !important; }
  .fc-col-header-cell-cushion { color: var(--text-3) !important; font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
  .fc-daygrid-day-number { color: var(--text-2) !important; font-size: .85rem; font-weight: 500; padding: 8px !important; }
  .fc-day-today { background: rgba(59, 130, 246, 0.05) !important; }
  .fc-day-today .fc-daygrid-day-number { color: var(--led-blue) !important; font-weight: 700; }
  
  .fc-event { border: none !important; padding: 2px 4px !important; border-radius: 4px !important; font-size: .75rem !important; font-weight: 600 !important; cursor: pointer; }
  .fc-event-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .event-expired { background: rgba(239, 68, 68, 0.15) !important; color: #ef4444 !important; border-left: 3px solid #ef4444 !important; }
  .event-expiring { background: rgba(245, 158, 11, 0.15) !important; color: #f59e0b !important; border-left: 3px solid #f59e0b !important; }
  .event-safe { background: rgba(16, 185, 129, 0.15) !important; color: #10b981 !important; border-left: 3px solid #10b981 !important; }

  .fc-toolbar-title { font-size: 1.1rem !important; font-weight: 700 !important; color: var(--text-1) !important; }
  .fc-button { background: #334155 !important; border: 1px solid var(--border) !important; color: var(--text-2) !important; font-size: .85rem !important; font-weight: 600 !important; text-transform: capitalize !important; }
  .fc-button:hover { background: #475569 !important; color: var(--text-1) !important; }
  .fc-button-active { background: var(--led-blue) !important; color: #fff !important; border-color: var(--led-blue) !important; }
  
  .cal-legend { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; padding: 0 .5rem; }
  .legend-item { display: flex; align-items: center; gap: .5rem; font-size: .8rem; font-weight: 600; color: var(--text-2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  
  .cal-container { background: #1e293b; border: 1px solid var(--border); border-radius: var(--r-lg); padding: 1.5rem; box-shadow: var(--shadow-sm); }
</style>
</head>
<body>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle"><svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        <button class="sidebar-collapse-btn" id="sidebarCollapseBtn"><svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M11 19l-7-7 7-7M18 5v14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <h1 class="page-title">Expiry Calendar</h1>
      </div>
      <div class="topbar-right">
        <a href="alerts.html" class="icon-btn"><svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="notif-dot" id="notifDot" style="display:none"></span></a>
        <div class="user-avatar" id="topbarAvatar">?</div>
      </div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <div class="page-header-left"><h2>Inventory Calendar</h2><p>Visualize product expiries across the month</p></div>
      </div>

      <div class="cal-legend">
        <div class="legend-item"><span class="legend-dot" style="background:#ef4444;"></span> Expired</div>
        <div class="legend-item"><span class="legend-dot" style="background:#f59e0b;"></span> Expiring Soon</div>
        <div class="legend-item"><span class="legend-dot" style="background:#10b981;"></span> Safe</div>
      </div>

      <div class="cal-container">
        <div id="calendar"></div>
      </div>
    </main>
  </div>
</div>

<script src="shared.js"></script>
<script>
initPage('calendar');

document.addEventListener('DOMContentLoaded', function() {
  const calendarEl = document.getElementById('calendar');
  const products   = DB.getProducts();
  
  const events = products.filter(p => p.expiryDate).map(p => {
    const es = getExpiryStatus(p.expiryDate);
    let className = 'event-safe';
    if (es.status === 'expired') className = 'event-expired';
    else if (es.status === 'expiring' || es.status === 'warning') className = 'event-expiring';
    
    return {
      title: p.name,
      start: p.expiryDate,
      className: className,
      extendedProps: { qty: p.quantity, price: p.sellingPrice }
    };
  });

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
    events: events,
    height: 'auto',
    eventClick: function(info) {
      showToast(`${info.event.title} - Qty: ${info.event.extendedProps.qty}`, 'info');
    }
  });
  
  calendar.render();
});
</script>
</body>
</html>
